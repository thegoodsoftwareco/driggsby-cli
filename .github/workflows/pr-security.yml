name: PR Security

env:
  CARGO_AUDIT_VERSION: "0.22.1"
  CARGO_DIST_VERSION: "0.31.0"

on:
  pull_request:
    paths:
      - ".cargo/audit.toml"
      - ".github/workflows/pr-security.yml"
      - ".github/workflows/security-background.yml"
      - ".github/workflows/release.yml"
      - "Cargo.lock"
      - "Cargo.toml"
      - "Justfile"
      - "LICENSE"
      - "README.md"
      - "crates/driggsby-cli/**"
      - "dist-workspace.toml"
      - "**/Cargo.toml"
      - "scripts/check_github_action_pins.sh"
      - "package-lock.json"
      - "package.json"
      - "scripts/release/check-npm-publish-surface.ts"
      - "scripts/release/pack-npm-package.ts"
      - "scripts/release/npm-publish-surface.secretlintrc.json"
      - "npm/driggsby/**"
      - "tsconfig.json"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck npm package tooling
        run: npm run check

      - name: Build npm package tooling
        run: npm run build

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config

      - name: Restore Rust verify target cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: target
          key: rust-verify-target-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/driggsby-cli/Cargo.toml') }}
          restore-keys: |
            rust-verify-target-${{ runner.os }}-

      - name: Check Rust formatting
        run: cargo fmt --all -- --check

      - name: Lint Rust libraries and binaries
        run: |
          cargo clippy --workspace --lib --bins --examples --all-features -- \
            -D warnings -D clippy::unwrap_used -D clippy::expect_used \
            -D clippy::panic -D clippy::todo -D clippy::unimplemented \
            -D clippy::undocumented_unsafe_blocks

      - name: Lint Rust tests
        run: |
          cargo clippy --workspace --tests --all-features -- \
            -D warnings -D clippy::unwrap_used -D clippy::expect_used \
            -D clippy::todo -D clippy::unimplemented \
            -D clippy::undocumented_unsafe_blocks

      - name: Test Rust CLI
        run: cargo test --all-features --locked

      - name: Build Rust CLI
        run: cargo build --locked

  cargo-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore Rust caches
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/advisory-db
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-audit-${{ runner.os }}-${{ env.CARGO_AUDIT_VERSION }}-${{ hashFiles('Cargo.lock', '.cargo/audit.toml') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-${{ env.CARGO_AUDIT_VERSION }}-
            cargo-audit-${{ runner.os }}-

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo-audit
        shell: bash
        run: |
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked --debug
          fi

      - name: Audit Rust dependencies
        run: cargo audit --deny warnings

  release-surface-smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Restore dist caches
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: pr-security-release-surface-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'dist-workspace.toml', '.github/workflows/pr-security.yml', '.github/workflows/release.yml') }}

      - name: Set up Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.25.1"

      - name: Install actionlint
        run: go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Validate workflow semantics
        run: actionlint .github/workflows/*.yml

      - name: Validate workflow YAML
        run: |
          ruby -e 'require "yaml"; Dir[".github/workflows/*.yml"].sort.each { |f| YAML.load_file(f) }'

      - name: Verify pinned GitHub Actions
        run: bash scripts/check_github_action_pins.sh

      - name: Install cargo-dist
        shell: bash
        run: |
          if ! command -v dist >/dev/null 2>&1; then
            cargo install cargo-dist --version "$CARGO_DIST_VERSION" --locked --debug
          fi

      - name: Install Node dependencies
        run: npm ci

      - name: Typecheck npm package validator
        run: npm run check

      - name: Build npm package validator
        run: npm run build

      - name: Plan hyphen-tagged release
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -1)
          release_tag="driggsby-v${version}"
          dist plan --tag="$release_tag" --output-format=json > plan-dist-manifest.json
          node - "$release_tag" <<'NODE'
          const fs = require("node:fs");

          const expectedTag = process.argv[2];
          const manifest = JSON.parse(fs.readFileSync("plan-dist-manifest.json", "utf8"));
          const release = manifest.releases?.find((entry) => entry.app_name === "driggsby");

          if (manifest.announcement_tag !== expectedTag) {
            throw new Error(`expected announcement_tag ${expectedTag}, got ${manifest.announcement_tag}`);
          }
          if (!release) {
            throw new Error("missing driggsby release in dist plan");
          }
          if (release.app_version !== expectedTag.replace("driggsby-v", "")) {
            throw new Error(`unexpected release version ${release.app_version}`);
          }
          const manifestText = JSON.stringify(manifest);
          if (manifestText.includes("driggsby-npm-package.tar.gz")) {
            throw new Error("dist plan should not include cargo-dist's generated npm package");
          }
          if (JSON.stringify(manifest).includes("driggsby/v")) {
            throw new Error("dist plan still contains slash-style driggsby/v release path");
          }
          NODE

      - name: Pack and scan owned npm package
        shell: bash
        run: |
          version=$(sed -n 's/^version = "\(.*\)"$/\1/p' Cargo.toml | head -1)
          dist build --tag="driggsby-v${version}" --artifacts=global --output-format=json > global-dist-manifest.json
          mkdir -p target/distrib
          for artifact in \
            driggsby-aarch64-apple-darwin.tar.xz \
            driggsby-x86_64-apple-darwin.tar.xz \
            driggsby-x86_64-unknown-linux-gnu.tar.xz; do
            printf '%064d  %s\n' 1 "$artifact" > "target/distrib/${artifact}.sha256"
          done
          npm run pack:npm
          node dist/scripts/release/check-npm-publish-surface.js "target/distrib/driggsby-${version}.tgz"
          tar -xOf "target/distrib/driggsby-${version}.tgz" package/package.json > generated-package.json
          node - "$version" <<'NODE'
          const fs = require("node:fs");

          const version = process.argv[2];
          const pkg = JSON.parse(fs.readFileSync("generated-package.json", "utf8"));
          const expectedUrl = `https://github.com/thegoodsoftwareco/driggsby-cli/releases/download/driggsby-v${version}`;

          if (pkg.name !== "driggsby") {
            throw new Error(`expected npm package name driggsby, got ${pkg.name}`);
          }
          if (pkg.version !== version) {
            throw new Error(`expected npm package version ${version}, got ${pkg.version}`);
          }
          if (pkg.driggsbyArtifacts?.baseUrl !== expectedUrl) {
            throw new Error(`expected artifact URL ${expectedUrl}, got ${pkg.driggsbyArtifacts?.baseUrl}`);
          }
          NODE
