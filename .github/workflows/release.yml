name: Release

permissions:
  contents: read

env:
  CARGO_AUDIT_VERSION: "0.22.1"
  CARGO_DIST_VERSION: "0.31.0"

on:
  push:
    tags:
      - "driggsby-v*"

jobs:
  verify-release-target:
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: true
          submodules: recursive
      - name: Validate release tag format
        shell: bash
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^driggsby-v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: ${GITHUB_REF_NAME}" >&2
            exit 1
          fi
      - name: Verify tagged commit is current origin/main
        run: |
          git fetch origin main:refs/remotes/origin/main
          test "$GITHUB_SHA" = "$(git rev-parse origin/main)"

  security-audit:
    needs:
      - verify-release-target
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Compute cargo-audit cache ABI
        id: cargo-audit-cache
        shell: bash
        run: |
          set -euo pipefail
          glibc_hash="$(ldd --version | head -n 1 | sha256sum | cut -d ' ' -f 1)"
          rustc_version="$(rustc -Vv | awk '/^host:/ { print $2 }')"
          echo "abi=${{ runner.os }}-${{ runner.arch }}-${rustc_version}-${glibc_hash}" >> "$GITHUB_OUTPUT"
      - name: Restore cargo-audit binary cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-bin-${{ steps.cargo-audit-cache.outputs.abi }}-${{ env.CARGO_AUDIT_VERSION }}
      - name: Restore Rust audit data caches
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: |
            ~/.cargo/advisory-db
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-audit-data-${{ runner.os }}-${{ env.CARGO_AUDIT_VERSION }}-${{ hashFiles('Cargo.lock', '.cargo/audit.toml') }}
          restore-keys: |
            cargo-audit-data-${{ runner.os }}-${{ env.CARGO_AUDIT_VERSION }}-
            cargo-audit-data-${{ runner.os }}-
      - name: Install cargo-audit
        shell: bash
        run: |
          set -euo pipefail
          audit_bin="$HOME/.cargo/bin/cargo-audit"
          needs_install=false
          if [ ! -x "$audit_bin" ]; then
            needs_install=true
          elif ! "$audit_bin" --version | grep -Fx "cargo-audit $CARGO_AUDIT_VERSION" >/dev/null; then
            needs_install=true
          fi
          if [ "$needs_install" = true ]; then
            rm -f "$audit_bin"
            cargo install cargo-audit --version "$CARGO_AUDIT_VERSION" --locked --debug
          fi
      - name: Audit Rust dependencies
        run: |
          "$HOME/.cargo/bin/cargo-audit" audit --deny warnings

  verify:
    needs:
      - verify-release-target
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Typecheck npm package tooling
        run: npm run check
      - name: Build npm package tooling
        run: npm run build
      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libdbus-1-dev pkg-config
      - name: Restore Rust verify target cache
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: target
          key: rust-verify-target-${{ runner.os }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/driggsby-cli/Cargo.toml') }}
          restore-keys: |
            rust-verify-target-${{ runner.os }}-
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Lint Rust libraries and binaries
        run: |
          cargo clippy --workspace --lib --bins --examples --all-features -- \
            -D warnings -D clippy::unwrap_used -D clippy::expect_used \
            -D clippy::panic -D clippy::todo -D clippy::unimplemented \
            -D clippy::undocumented_unsafe_blocks
      - name: Lint Rust tests
        run: |
          cargo clippy --workspace --tests --all-features -- \
            -D warnings -D clippy::unwrap_used -D clippy::expect_used \
            -D clippy::todo -D clippy::unimplemented \
            -D clippy::undocumented_unsafe_blocks
      - name: Test Rust CLI
        run: cargo test --all-features --locked
      - name: Build Rust CLI
        run: cargo build --locked

  plan:
    needs:
      - verify-release-target
      - security-audit
      - verify
    runs-on: "ubuntu-22.04"
    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ github.ref_name }}
      tag-flag: ${{ format('--tag={0}', github.ref_name) }}
      publishing: "true"
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        shell: bash
        run: bash scripts/release/install-cargo-dist.sh
      - id: plan
        run: |
          dist plan --tag="${{ github.ref_name }}" --output-format=json > plan-dist-manifest.json
          echo "dist ran successfully"
          cat plan-dist-manifest.json
          echo "manifest=$(jq -c "." plan-dist-manifest.json)" >> "$GITHUB_OUTPUT"
      - name: Upload dist-manifest.json
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  build-local-artifacts:
    name: build-local-artifacts (${{ join(matrix.targets, ', ') }})
    needs:
      - plan
    if: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix.include != null && (needs.plan.outputs.publishing == 'true' || fromJson(needs.plan.outputs.val).ci.github.pr_run_mode == 'upload') }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
    runs-on: ${{ matrix.runner }}
    container: ${{ matrix.container && matrix.container.image || null }}
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json
    steps:
      - name: enable windows longpaths
        run: |
          git config --global core.longpaths true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        shell: bash
        run: bash scripts/release/install-cargo-dist.sh
      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - name: Install Linux native dependencies
        if: ${{ runner.os == 'Linux' }}
        shell: bash
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y libdbus-1-dev pkg-config
          else
            apt-get update
            apt-get install -y libdbus-1-dev pkg-config
          fi
      - name: Install dependencies
        run: |
          ${{ matrix.packages_install }}
      - name: Build artifacts
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --print=linkage --output-format=json ${{ matrix.dist_args }} > dist-manifest.json
          echo "dist ran successfully"
      - id: cargo-dist
        name: Post-build
        shell: bash
        run: |
          {
            echo "paths<<EOF"
            dist print-upload-files-from-manifest --manifest dist-manifest.json
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  build-global-artifacts:
    needs:
      - plan
      - build-local-artifacts
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Install dist
        shell: bash
        run: bash scripts/release/install-cargo-dist.sh
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Build npm package tooling
        run: npm run build
      - name: Fetch local artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true
      - id: cargo-dist
        shell: bash
        run: |
          dist build ${{ needs.plan.outputs.tag-flag }} --output-format=json "--artifacts=global" > dist-manifest.json
          npm run pack:npm
          echo "dist ran successfully"

          {
            echo "paths<<EOF"
              jq --raw-output ".upload_files[]" dist-manifest.json
              find target/distrib -maxdepth 1 -name 'driggsby-*.tgz' -print
              echo "EOF"
          } >> "$GITHUB_OUTPUT"

          cp dist-manifest.json "$BUILD_MANIFEST_NAME"
      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.cargo-dist.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  scan-npm-package:
    needs:
      - build-global-artifacts
      - plan
    if: ${{ needs.plan.outputs.publishing == 'true' && needs.build-global-artifacts.result == 'success' }}
    runs-on: "ubuntu-22.04"
    permissions:
      contents: read
    env:
      PLAN: ${{ needs.plan.outputs.val }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: artifacts-build-global
          path: npm/
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          cache: npm
      - name: Install Node dependencies
        run: npm ci
      - name: Build npm package validator
        run: npm run build
      - name: Secret-scan generated npm tarballs
        shell: bash
        run: |
          mapfile -t packages < <(find npm -maxdepth 1 -name 'driggsby-*.tgz' -print | sort)
          if [[ "${#packages[@]}" -ne 1 ]]; then
            echo "Expected exactly one owned Driggsby npm package, found ${#packages[@]}." >&2
            exit 1
          fi
          node dist/scripts/release/check-npm-publish-surface.js "${packages[0]}"

  host:
    needs:
      - verify-release-target
      - plan
      - build-local-artifacts
      - build-global-artifacts
      - scan-npm-package
    if: ${{ always() && needs.verify-release-target.result == 'success' && needs.plan.result == 'success' && needs.plan.outputs.publishing == 'true' && needs.scan-npm-package.result == 'success' && (needs.build-global-artifacts.result == 'skipped' || needs.build-global-artifacts.result == 'success') && (needs.build-local-artifacts.result == 'skipped' || needs.build-local-artifacts.result == 'success') }}
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    runs-on: "ubuntu-22.04"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Download GitHub artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true
      - name: Cleanup manifests
        run: |
          rm -f artifacts/*dist-manifest.json
      - name: Create GitHub Release
        env:
          PRERELEASE_FLAG: ${{ fromJson(needs.plan.outputs.val).announcement_is_prerelease && '--prerelease' || '' }}
          ANNOUNCEMENT_TITLE: ${{ fromJson(needs.plan.outputs.val).announcement_title }}
          ANNOUNCEMENT_BODY: ${{ fromJson(needs.plan.outputs.val).announcement_github_body }}
          RELEASE_COMMIT: ${{ github.sha }}
          RELEASE_TAG: ${{ needs.plan.outputs.tag }}
        shell: bash
        run: |
          echo "$ANNOUNCEMENT_BODY" > "$RUNNER_TEMP/notes.txt"
          prerelease_args=()
          if [[ -n "$PRERELEASE_FLAG" ]]; then
            prerelease_args+=("$PRERELEASE_FLAG")
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; refusing to overwrite immutable public artifacts." >&2
            exit 1
          fi

          gh release create "$RELEASE_TAG" --target "$RELEASE_COMMIT" "${prerelease_args[@]}" --title "$ANNOUNCEMENT_TITLE" --notes-file "$RUNNER_TEMP/notes.txt" artifacts/*

  publish-npm:
    needs:
      - verify-release-target
      - plan
      - scan-npm-package
      - host
    runs-on: "ubuntu-22.04"
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PLAN: ${{ needs.plan.outputs.val }}
    if: ${{ needs.verify-release-target.result == 'success' && needs.scan-npm-package.result == 'success' && (!fromJson(needs.plan.outputs.val).announcement_is_prerelease || fromJson(needs.plan.outputs.val).publish_prereleases) }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          submodules: recursive
      - name: Fetch npm packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: artifacts-build-global
          path: npm/
          merge-multiple: true
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Publish npm package
        shell: bash
        run: |
          mapfile -t packages < <(find npm -maxdepth 1 -name 'driggsby-*.tgz' -print | sort)
          if [[ "${#packages[@]}" -ne 1 ]]; then
            echo "Expected exactly one owned Driggsby npm package, found ${#packages[@]}." >&2
            exit 1
          fi
          npm publish --access public --provenance "./${packages[0]}"
